name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ['**']

# Cancel superseded runs when new commits are pushed to the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Audit (high and critical only)
        run: npm audit --audit-level=high

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
          NEXT_PUBLIC_STRIPE_PRICE_ID: price_placeholder
          NEXT_PUBLIC_STRIPE_ANNUAL_PRICE_ID: price_placeholder
          OPENAI_API_KEY: sk-placeholder
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder

  # The Railway video worker is a separate package (own tsconfig/deps) excluded
  # from the root typecheck — give it its own typecheck + build so a broken
  # import there fails the PR instead of only surfacing at Railway deploy time.
  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install worker dependencies
        run: npm ci

      - name: Type check worker
        run: npm run typecheck

      - name: Build worker
        run: npm run build
